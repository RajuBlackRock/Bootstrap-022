<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap-02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- <h1 class="bg-success text-color">Welcome to our website</h1> -->

    <div class="row mb-5">
        <div class="col-4 bg-success">4 colum</div>
        <div class="col-8 bg-danger">8 colum</div>
    </div>

    <div class="row mb-5">
        <div class="col-3 bg-info">3 colum</div>
        <div class="col-3 bg-success">3 colum</div>
        <div class="col-3 bg-primary">3 colum</div>
        <div class="col-3 bg-dark text-light">3 colum</div>
    </div>

    <div class="row">
        <div class="col-3 col-sm-4 col-md-4 bg-info">4 colum</div>
        <div class="col-3 col-sm-3 col-md-4 bg-danger">3 colum</div>
        <div class="col-3 col-sm-3 col-md-2 bg-success">3 colum</div>
        <div class="col-3 col-sm-2 col-md-2 bg-dark text-light">2 colum</div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

</html>
